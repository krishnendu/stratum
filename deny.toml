# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[graph]
# Intentionally NOT all-features: the off-by-default `provider-llama-cpp`
# feature pulls in the heavy llama.cpp dependency tree which is exercised
# by `.github/workflows/provider-llama-cpp.yml` (nightly cron / release /
# manual dispatch), not per-PR CI. Re-evaluate licences + advisories there.
# TODO: when `provider-llama-cpp` graduates to default-on, flip this back
# and audit any new transitive deps (cmake/cc/glibc-tooling sub-tree).
all-features = false

[advisories]
db-path  = "~/.cargo/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]
yanked   = "deny"
# RUSTSEC-2024-0436: `paste` is unmaintained. Pulled transitively via ratatui
# 0.29 (only used by ratatui's compile-time macro expansion). No safe upgrade
# path exists today; revisit when ratatui drops the dep.
ignore   = ["RUSTSEC-2024-0436"]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots: Mozilla's CA bundle, permissive licence.
    "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards         = "warn"
highlight         = "all"
allow             = []
deny              = []
skip              = []
skip-tree         = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
