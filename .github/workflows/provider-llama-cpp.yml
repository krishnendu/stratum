name: provider-llama-cpp

# Off the per-PR critical path. Exercises the heavy llama.cpp build only
# when a maintainer asks for it via `gh workflow run provider-llama-cpp.yml`
# or right before a release tag is published.
on:
  workflow_dispatch:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  # Tiny chat-tuned model used for the on-demand smoke test. ~352 MB Q4_K_M
  # quant; reachable from huggingface without auth.
  STRATUM_LLAMA_MODEL_URL: "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
  STRATUM_LLAMA_MODEL_SHA256: "74a4da8c9fdbcd15bd1f6d01d621410d31c6fc00986f5eb687824e7b93d7a9db"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (ubuntu-latest)
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      MATRIX_FEATURES: provider-llama-cpp
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Cold cache for this workflow is multi-minute.
          key: ubuntu-latest-${{ hashFiles('Cargo.lock') }}

      - name: Install build deps (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Cache GGUF model file
        id: gguf-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/stratum-models
          # Key the cache by the expected SHA so a change in the model
          # URL or content invalidates the cache automatically.
          key: stratum-llama-gguf-${{ env.STRATUM_LLAMA_MODEL_SHA256 }}

      - name: Download GGUF model (if not cached)
        if: steps.gguf-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/stratum-models"
          dest="$HOME/.cache/stratum-models/${STRATUM_LLAMA_MODEL_SHA256}.gguf"
          echo "Downloading model to $dest"
          curl -fL --retry 3 --retry-delay 5 -o "$dest" "$STRATUM_LLAMA_MODEL_URL"
          ls -lh "$dest"

      - name: Verify GGUF model SHA-256
        run: |
          set -euo pipefail
          dest="$HOME/.cache/stratum-models/${STRATUM_LLAMA_MODEL_SHA256}.gguf"
          if [ ! -f "$dest" ]; then
            echo "model file missing at $dest" >&2
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "$dest" | awk '{print $1}')
          else
            actual=$(shasum -a 256 "$dest" | awk '{print $1}')
          fi
          echo "expected: $STRATUM_LLAMA_MODEL_SHA256"
          echo "actual:   $actual"
          # The on-demand workflow is the first place this URL is ever
          # downloaded; if upstream changed the file the maintainer
          # bumps the SHA constant above. We still abort here so a
          # silent swap never goes unnoticed.
          if [ "$actual" != "$STRATUM_LLAMA_MODEL_SHA256" ]; then
            echo "SHA-256 mismatch — refusing to run tests against an unverified model" >&2
            exit 1
          fi
          echo "STRATUM_LLAMA_GGUF_PATH=$dest" >> "$GITHUB_ENV"

      - name: cargo build
        run: cargo build --workspace --features ${{ env.MATRIX_FEATURES }}

      - name: cargo test
        run: cargo test --workspace --features ${{ env.MATRIX_FEATURES }} --no-fail-fast
