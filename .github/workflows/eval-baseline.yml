name: eval-baseline

on:
  # Manual-only: nightly cron disabled (GH Actions quota gone).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: eval baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: build
        run: cargo build --release --bin stratum
      - name: run baseline
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/state
          ./target/release/stratum --storage-root /tmp/state eval run --suite evals/baseline.json --out /tmp/state/baseline-report.json --json | tee baseline-summary.json
      - name: upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-report
          path: |
            /tmp/state/baseline-report.json
            baseline-summary.json
