name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Intentionally NOT --all-features: the off-by-default
      # `provider-llama-cpp` feature pulls in the heavy llama.cpp build and
      # is exercised on nightly cron / release / manual dispatch via
      # `.github/workflows/provider-llama-cpp.yml` instead.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # See clippy job comment re: `provider-llama-cpp`.
      - run: cargo test --workspace --no-fail-fast

  doctor-schema-check:
    name: doctor schema invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --test doctor_schema
        run: cargo test --package stratum-cli --test doctor_schema -- --include-ignored

  xtask-check-error-codes:
    name: xtask check-error-codes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- check-error-codes

  coverage:
    name: 100% line coverage (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # `cargo llvm-cov` has historically silently skipped
      # `--fail-under-lines` enforcement when combined with `--lcov
      # --output-path` in some versions. To guarantee G2.1 is a hard gate, we
      # split coverage into two invocations: the first is the gate (no LCOV
      # output), the second is the artifact emitter (no threshold). See
      # `docs/verification-gates.md` G2.1.
      - name: cargo llvm-cov (threshold gate)
        shell: bash
        # Excludes the `provider-llama-cpp` feature; see clippy job comment.
        # Excludes `xtask` (dev tooling, not shipped); see
        # `docs/coverage-exclusions.md`.
        run: |
          set -euxo pipefail
          cargo llvm-cov --workspace --exclude xtask --fail-under-lines 95
      - name: cargo llvm-cov (lcov artifact)
        shell: bash
        # Excludes the `provider-llama-cpp` feature; see clippy job comment.
        run: |
          set -euxo pipefail
          cargo llvm-cov --workspace --exclude xtask --lcov --output-path lcov.info
      - name: Upload coverage report
        if: hashFiles('lcov.info') != ''
        uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info

  deny:
    name: cargo deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Excludes the `provider-llama-cpp` feature; see clippy job comment.
          arguments: --workspace

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.90.0
      - uses: Swatinem/rust-cache@v2
      # Excludes the `provider-llama-cpp` feature; see clippy job comment.
      - run: cargo check --workspace --locked
