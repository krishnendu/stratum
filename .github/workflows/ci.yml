name: CI

on:
  # Manual-only: GH Actions quota is gone; CI runs locally via
  # `cargo fmt --check && cargo clippy --workspace --all-targets -- -D
  # warnings && cargo test --workspace --no-fail-fast && cargo llvm-cov
  # --workspace --exclude xtask --exclude stratum-tui --exclude
  # stratum-backend-local --ignore-filename-regex
  # 'crates/stratum-runtime/src/mic\.rs' --fail-under-lines 96`.
  # PR review remains a local-discipline gate.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `libasound2-dev` provides the ALSA pkg-config / headers that
      # `alsa-sys` (a transitive dep of `cpal`, used by
      # `stratum-runtime::mic`) links against on Linux. macOS gets
      # CoreAudio for free.
      - name: Install ALSA dev headers (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # Intentionally NOT --all-features: the off-by-default
      # `provider-llama-cpp` feature pulls in the heavy llama.cpp build and
      # is exercised on nightly cron / release / manual dispatch via
      # `.github/workflows/provider-llama-cpp.yml` instead.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `bubblewrap` is required by the Linux sandbox-spawn tests added in
      # PR #69; without it those tests early-return (skip). macOS uses
      # `sandbox-exec`, which ships with the OS. See
      # `docs/verification-gates.md` for the sandbox gate.
      - name: Install bubblewrap + ALSA dev headers (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap libasound2-dev
      # See clippy job comment re: `provider-llama-cpp`.
      - run: cargo test --workspace --no-fail-fast

  doctor-schema-check:
    name: doctor schema invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # See clippy job comment re: ALSA headers.
      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: cargo test --test doctor_schema
        run: cargo test --package stratum-cli --test doctor_schema -- --include-ignored

  xtask-check-error-codes:
    name: xtask check-error-codes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # See clippy job comment re: ALSA headers.
      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo run -p xtask -- check-error-codes

  coverage:
    name: 100% line coverage (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov
      # See clippy job comment re: ALSA headers.
      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # `cargo llvm-cov` has historically silently skipped
      # `--fail-under-lines` enforcement when combined with `--lcov
      # --output-path` in some versions. To guarantee G2.1 is a hard gate, we
      # split coverage into two invocations: the first is the gate (no LCOV
      # output), the second is the artifact emitter (no threshold). See
      # `docs/verification-gates.md` G2.1.
      - name: cargo llvm-cov (threshold gate)
        shell: bash
        # Excludes the `provider-llama-cpp` feature; see clippy job comment.
        # Excludes `xtask` (dev tooling, not shipped). Excludes
        # `stratum-tui` + `stratum-backend-local` (workspace-internal
        # crates housing the moved chat.rs whose render/event-loop
        # paths are TTY-bound; same carve-out as the original CLI
        # chat::run + chat::event_loop). Excludes `mic.rs` via
        # `--ignore-filename-regex`: the file mixes pure-data helpers
        # (covered) with cpal-bound methods (SIGSEGV under cargo test on
        # headless CI), and the OS-audio half cannot be unit-tested
        # without a synthetic device backend; see
        # `docs/coverage-exclusions.md`.
        run: |
          set -euxo pipefail
          cargo llvm-cov \
            --workspace \
            --exclude xtask \
            --exclude stratum-tui \
            --exclude stratum-backend-local \
            --ignore-filename-regex 'crates/stratum-runtime/src/mic\.rs' \
            --fail-under-lines 96
      - name: cargo llvm-cov (lcov artifact)
        shell: bash
        # Excludes the `provider-llama-cpp` feature; see clippy job comment.
        run: |
          set -euxo pipefail
          cargo llvm-cov --workspace --exclude xtask --lcov --output-path lcov.info
      - name: Upload coverage report
        if: hashFiles('lcov.info') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov
          path: lcov.info

  deny:
    name: cargo deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
          # Excludes the `provider-llama-cpp` feature; see clippy job comment.
          arguments: --workspace

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.90.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # See clippy job comment re: ALSA headers.
      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # Excludes the `provider-llama-cpp` feature; see clippy job comment.
      - run: cargo check --workspace --locked
