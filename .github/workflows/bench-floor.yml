name: bench-floor

# Phase 7: nightly deterministic regression bench.
#
# Runs every documented eval suite via `stratum-eval`'s `bench-floor`
# binary against the synthetic EchoProvider floor, then `bench-history`
# appends the result to `.github/bench-history/<YYYY-MM>.jsonl` and
# refreshes `latest.json`. The updated history dir is committed back to
# `main` by the workflow (the bin never touches git itself).
#
# Gated on `schedule:` + `workflow_dispatch:` only — never per-PR.

on:
  # Manual-only: nightly cron disabled (GH Actions quota gone). Run
  # locally with `cargo run -p stratum-eval --bin bench-floor` and
  # `cargo run -p stratum-eval --bin bench-history` when needed.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

permissions:
  contents: write

concurrency:
  # Workflow-global group (NOT ref-scoped) so two simultaneous runs
  # — e.g. one cron + one manual dispatch on a different ref — queue
  # rather than race on the JSONL append in bench-history.
  group: bench-floor
  cancel-in-progress: false

jobs:
  bench:
    name: bench-floor + bench-history
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # The workflow commits the history dir back; need write token.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: bench-floor-${{ hashFiles('Cargo.lock') }}
      - name: Build bench bins
        run: |
          cargo build --release \
            -p stratum-eval \
            --bin bench-floor \
            --bin bench-history
      - name: Prepare artifact dir
        run: mkdir -p target/bench
      - name: Run bench-floor
        run: |
          ./target/release/bench-floor \
            --evals-dir evals \
            --out target/bench/result.json
      - name: Run bench-history
        run: |
          ./target/release/bench-history \
            --result target/bench/result.json \
            --history-dir .github/bench-history
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-floor-result
          path: target/bench/result.json
      - name: Commit history update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          # Per-repo identity (no global git config — see MEMORY).
          git config user.name "stratum-bench-bot"
          git config user.email "stratum-bench-bot@users.noreply.github.com"
          # Nothing to do if the bench produced an identical row (rare
          # because mtime moves) — skip silently.
          if [ -z "$(git status --porcelain .github/bench-history)" ]; then
            echo "bench-history: no changes to commit"
            exit 0
          fi
          git add .github/bench-history
          # `[skip ci]` so the auto-commit doesn't trigger sibling
          # workflows that watch `push: branches: [main]`.
          git commit -m "chore(bench): nightly floor result $(date -u +%Y-%m-%d) [skip ci]"
          git push origin HEAD:main
