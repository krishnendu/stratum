name: release

on:
  # Manual-only: tag-push trigger removed because GH Actions quota is
  # gone. The actual release flow is: maintainer builds binaries +
  # tarballs + sha256s LOCALLY (cross-compile from macOS via
  # `cargo build` for native arm64/x86_64 mac and `cargo zigbuild`
  # for linux arm64/x86_64), then `gh release create vX.Y.Z` uploads
  # them. This workflow is retained ONLY as a documented build recipe
  # and can be triggered via `gh workflow run release.yml` in the rare
  # case a future quota window allows a CI-built release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write  # for creating releases

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux prebuilts ship WITHOUT --features voice. cpal pulls
          # `alsa-sys` which requires libasound2-dev on the build runner
          # AND links libasound2.so.2 at runtime — keeping voice off on
          # the Linux tarball means the prebuilt runs on minimal distros
          # without an ALSA dep, and users who want voice compile from
          # source with --features voice after `apt install libasound2-dev`.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            builder: cargo
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            builder: zigbuild
            features: ""
          # macOS prebuilts ship WITH --features voice. CoreAudio is a
          # system framework with no extra deps so the resulting binary
          # has no surprise runtime requirements.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            builder: cargo
            features: "--features voice"
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
            builder: cargo
            features: "--features voice"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: install zig + cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0
      - name: install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        run: cargo install --locked cargo-zigbuild
      - name: cargo build --release
        if: matrix.builder == 'cargo'
        run: cargo build --release --bin stratum --target ${{ matrix.target }} ${{ matrix.features }}
      - name: cargo zigbuild --release
        if: matrix.builder == 'zigbuild'
        run: cargo zigbuild --release --bin stratum --target ${{ matrix.target }} ${{ matrix.features }}
      - name: archive
        shell: bash
        run: |
          set -euxo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if [ -z "$tag" ] || [ "$tag" = "$GITHUB_REF" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          name="stratum-${tag}-${{ matrix.target }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/stratum dist/
          chmod +x dist/stratum
          tar -C dist -czf ${name}.tar.gz stratum
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${name}.tar.gz > ${name}.tar.gz.sha256
          else
            shasum -a 256 ${name}.tar.gz > ${name}.tar.gz.sha256
          fi
          ls -lh ${name}.tar.gz*
      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stratum-${{ matrix.target }}
          path: |
            stratum-*.tar.gz
            stratum-*.tar.gz.sha256

  publish:
    name: publish github release + manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: collect artifacts + manifest
        shell: bash
        run: |
          set -euxo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if [ -z "$tag" ] || [ "$tag" = "$GITHUB_REF" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          # Flatten + compute summary table
          mkdir -p release-files
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -exec cp {} release-files/ \;
          ls -lh release-files
          # Build manifest JSON
          version="${tag#v}"
          python3 - <<PY
          import hashlib, json, os, pathlib, sys
          tag = "${tag}"
          version = "${version}"
          out = {
              "schema_version": 1,
              "channel": "stable",
              "latest": None,
              "history": [],
          }
          artifacts = []
          for p in sorted(pathlib.Path("release-files").glob("*.tar.gz")):
              data = p.read_bytes()
              sha = hashlib.sha256(data).hexdigest()
              bytes_ = len(data)
              target = p.stem.split("-", 2)[2].rsplit(".tar", 1)[0]
              platform = {
                  "x86_64-unknown-linux-gnu": "linux_x86_64",
                  "aarch64-unknown-linux-gnu": "linux_aarch64",
                  "aarch64-apple-darwin": "macos_aarch64",
                  "x86_64-apple-darwin": "macos_x86_64",
              }.get(target)
              if not platform:
                  continue
              artifacts.append({
                  "url": f"https://github.com/krishnendu/stratum/releases/download/{tag}/{p.name}",
                  "sha256": sha,
                  "bytes": bytes_,
                  "platform": platform,
              })
          entry = {
              "version": {
                  "major": int(version.split(".")[0]),
                  "minor": int(version.split(".")[1]),
                  "patch": int(version.split(".")[2].split("-")[0]),
                  "pre": None if "-" not in version else version.split("-", 1)[1],
              },
              "released_at": {"secs_since_epoch": int(__import__("time").time()), "nanos_since_epoch": 0},
              "binary": artifacts[0] if artifacts else None,
              "min_supported_from": None,
              "release_notes_url": f"https://github.com/krishnendu/stratum/releases/tag/{tag}",
          }
          # Stratum's UpdateManifest expects ONE binary per release, but the artifact list
          # carries platforms in `binary.platform`. The first artifact wins for the manifest's
          # `latest.binary`; the rest are linked via GitHub's release assets directly. We document
          # this as a known limitation; a follow-up multi-binary manifest schema is on the
          # roadmap (see plan/27).
          out["latest"] = entry
          out["history"] = [entry]
          pathlib.Path("release-files/stable.json").write_text(json.dumps(out, indent=2))

          # Curated model catalog. Stratum doesn't bundle GGUFs (size + licensing),
          # but ships an opinionated default catalog that `stratum models sync`
          # pulls down. Entries point at HuggingFace mirrors users can fetch on
          # demand via `stratum models recommend ...` + manual `stratum chat --model`.
          catalog = {
              "schema_version": 1,
              "entries": {
                  "qwen-0.5b": {
                      "slug": "qwen-0.5b",
                      "family": "qwen",
                      "display_name": "Qwen2.5 0.5B Instruct (Q4_K_M)",
                      "tier": "low",
                      "task": ["chat"],
                      "size_mib": 469,
                      "quantization": "Q4_K_M",
                      "artifact": {
                          "url": "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf",
                          "sha256": "74a4da8c9fdbcd15bd1f6d01d621410d31c6fc00986f5eb687824e7b93d7a9db",
                          "bytes": 491720608
                      },
                      "license": "apache-2.0",
                      "homepage": "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF"
                  }
              }
          }
          pathlib.Path("release-files/catalog-stable.json").write_text(json.dumps(catalog, indent=2))
          PY
          ls -lh release-files
      - name: create github release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
