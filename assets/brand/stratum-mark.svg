<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Stratum">
  <title>Stratum mark</title>
  <!--
    Four stacked horizontal layers — geology "stratum". Each layer
    narrower than the one above; read top-down a wedge, bottom-up an
    arrow. Brand-primary fill (#1E5E5E warm slate teal).
  -->
  <g fill="#1E5E5E">
    <rect x="32"  y="56"  width="192" height="28" rx="6" />
    <rect x="48"  y="100" width="160" height="28" rx="6" />
    <rect x="64"  y="144" width="128" height="28" rx="6" />
    <rect x="80"  y="188" width="96"  height="28" rx="6" />
  </g>
</svg>
